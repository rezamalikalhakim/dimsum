<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dapur Melodia - Dimsum Premium</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .font-body { font-family: 'DM Sans', sans-serif; }
    .page { display: none; }
    .page.active { display: flex; flex-direction: column; }
    .menu-card { transition: transform 0.3s, box-shadow 0.3s; }
    .menu-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.12); }
    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .toast { animation: toastIn 0.4s ease, toastOut 0.4s ease 1.8s forwards; }
    @keyframes toastIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(-10px); } }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .cart-badge { animation: popIn 0.3s ease; }
    @keyframes popIn { 0% { transform: scale(0); } 70% { transform: scale(1.3); } 100% { transform: scale(1); } }
    
    /* Variabel Warna Utama */
    :root {
        --primary: #C0392B;
        --dark: #2C1810;
        --accent: #F39C12;
        --bg-soft: #FFF8F0;
    }
  </style>
 </head>
 <body class="h-full font-body">
  <div id="app" class="h-full w-full overflow-auto" style="background: var(--bg-soft);">
   
   <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50"></div>

   <div id="page-menu" class="page active min-h-full">
    <header class="relative overflow-hidden" style="background: linear-gradient(135deg, #8B1A1A 0%, #C0392B 50%, #E74C3C 100%);">
     <div class="absolute inset-0 opacity-10">
      <svg width="100%" height="100%"><pattern id="p" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="2" fill="white" /></pattern><rect width="100%" height="100%" fill="url(#p)" /></svg>
     </div>
     <div class="relative px-5 py-8 md:py-12 text-center">
      <div class="inline-flex items-center gap-2 mb-3 px-4 py-1.5 rounded-full" style="background:rgba(255,255,255,0.15);">
          <span class="text-xl">🥟</span> 
          <span class="text-white/90 text-sm font-medium tracking-wide">Dimsum Premium Homemade</span>
      </div>
      <h1 id="el-store-name" class="font-display text-4xl md:text-5xl font-bold text-white mb-2">Dapur Melodia</h1>
      <p id="el-tagline" class="text-white/80 text-base md:text-lg font-light">Cita rasa autentik, dibuat dengan cinta ❤️</p>
     </div>
     
     <button onclick="showPage('cart')" class="absolute top-5 right-5 bg-white/20 backdrop-blur-sm rounded-full p-3 hover:bg-white/30 transition-colors"> 
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span id="cart-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 rounded-full text-xs font-bold flex items-center justify-center text-white cart-badge" style="background:var(--accent);"></span> 
     </button>
    </header>

    <main class="flex-1 px-4 md:px-8 py-8 max-w-3xl mx-auto w-full">
     <div id="menu-container"></div>
    </main>

    <div id="floating-cart" class="hidden sticky bottom-0 left-0 right-0 p-4" style="background:rgba(44,24,16,0.95); backdrop-filter:blur(8px);">
     <button onclick="showPage('cart')" class="w-full flex items-center justify-between text-white rounded-xl px-5 py-3.5 font-semibold transition-transform active:scale-[0.98]" style="background:var(--primary);"> 
      <span class="flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          Lihat Keranjang
      </span> 
      <span id="floating-cart-total" class="bg-white/20 px-3 py-1 rounded-lg text-sm"></span> 
     </button>
    </div>
   </div>

   <div id="page-cart" class="page min-h-full">
    <header class="px-5 py-4 flex items-center gap-3 border-b bg-white border-[#F0E0D0]">
     <button onclick="showPage('menu')" class="p-2 rounded-full hover:bg-gray-100 transition">
         <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--dark)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
     </button>
     <h2 class="font-display text-xl font-bold" style="color:var(--dark);">Keranjang Anda</h2>
    </header>
    <main class="flex-1 px-4 md:px-8 py-6 max-w-3xl mx-auto w-full">
     <div id="cart-items" class="flex flex-col gap-4"></div>
     <div id="cart-empty" class="hidden text-center py-16">
      <span class="text-5xl mb-4 block">🛒</span>
      <p class="text-lg font-semibold" style="color:var(--dark);">Keranjang masih kosong</p>
      <button onclick="showPage('menu')" class="mt-5 px-6 py-2.5 rounded-full text-white font-semibold text-sm transition hover:opacity-90" style="background:var(--primary);">Lihat Menu</button>
     </div>
    </main>
    <div id="cart-footer" class="hidden sticky bottom-0 p-4 bg-white border-t border-[#F0E0D0]">
     <div class="max-w-3xl mx-auto">
      <div class="flex justify-between mb-3 text-sm" style="color:#8B7355;">
       <span>Subtotal</span><span id="cart-subtotal" class="font-semibold" style="color:var(--dark);"></span>
      </div>
      <button onclick="showPage('checkout')" class="w-full py-3.5 rounded-xl text-white font-bold text-base transition hover:opacity-90 active:scale-[0.98]" style="background:var(--primary);"> Checkout </button>
     </div>
    </div>
   </div>

   <div id="page-checkout" class="page min-h-full">
    <header class="px-5 py-4 flex items-center gap-3 border-b bg-white border-[#F0E0D0]">
     <button onclick="showPage('cart')" class="p-2 rounded-full hover:bg-gray-100 transition">
         <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--dark)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
     </button>
     <h2 class="font-display text-xl font-bold" style="color:var(--dark);">Data Pengiriman</h2>
    </header>
    <main class="flex-1 px-4 md:px-8 py-6 max-w-3xl mx-auto w-full fade-in">
     <div class="rounded-2xl p-5 mb-5 bg-white border border-[#F0E0D0]">
      <h3 class="font-display font-bold mb-3" style="color:var(--dark);">Ringkasan Pesanan</h3>
      <div id="checkout-items" class="flex flex-col gap-2 text-sm"></div>
      <div class="border-t mt-3 pt-3 flex justify-between font-bold border-[#F0E0D0]" style="color:var(--dark);">
       <span>Total Pembayaran</span><span id="checkout-total"></span>
      </div>
     </div>
     <form id="checkout-form" class="rounded-2xl p-5 mb-5 bg-white border border-[#F0E0D0]">
      <h3 class="font-display font-bold mb-4" style="color:var(--dark);">Informasi Pemesan</h3>
      <div class="flex flex-col gap-4">
       <div><label class="block text-sm font-medium mb-1.5" style="color:#5D4037;">Nama Lengkap</label> <input id="cust-name" type="text" required placeholder="Contoh: Budi Santoso" class="w-full px-4 py-2.5 rounded-xl text-sm outline-none border-[1.5px] border-[#E0D0C0] bg-[#FFFAF5] focus:border-[#C0392B]"></div>
       <div><label class="block text-sm font-medium mb-1.5" style="color:#5D4037;">No. WhatsApp</label> <input id="cust-phone" type="tel" required placeholder="08xxxxxxxxxx" class="w-full px-4 py-2.5 rounded-xl text-sm outline-none border-[1.5px] border-[#E0D0C0] bg-[#FFFAF5] focus:border-[#C0392B]"></div>
       <div><label class="block text-sm font-medium mb-1.5" style="color:#5D4037;">Alamat Lengkap</label> <textarea id="cust-address" required rows="3" placeholder="Nama jalan, nomor rumah, RT/RW..." class="w-full px-4 py-2.5 rounded-xl text-sm outline-none resize-none border-[1.5px] border-[#E0D0C0] bg-[#FFFAF5] focus:border-[#C0392B]"></textarea></div>
       <div>
        <label class="block text-sm font-medium mb-2" style="color:#5D4037;">Metode Pembayaran</label>
        <div class="flex flex-col gap-2">
         <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer bg-[#FFFAF5] border-[1.5px] border-[#E0D0C0]"> <input type="radio" name="payment" value="Transfer Bank" checked class="accent-red-700"> <span class="text-sm font-medium" style="color:var(--dark);">Transfer Bank</span> </label> 
         <label class="flex items-center gap-3 p-3 rounded-xl cursor-pointer bg-[#FFFAF5] border-[1.5px] border-[#E0D0C0]"> <input type="radio" name="payment" value="COD (Bayar di Tempat)" class="accent-red-700"> <span class="text-sm font-medium" style="color:var(--dark);">Bayar di Tempat (COD)</span> </label>
        </div>
       </div>
      </div>
     </form>
     <button onclick="placeOrder()" class="w-full py-4 rounded-xl text-white font-bold text-lg transition hover:opacity-90 active:scale-[0.98] mb-8" style="background:var(--primary);"> 
      Kirim Pesanan ke WhatsApp 
     </button>
    </main>
   </div>

   <div id="page-success" class="page min-h-full items-center justify-center text-center px-6">
    <div class="fade-in">
     <div class="text-7xl mb-4">🎉</div>
     <h2 class="font-display text-3xl font-bold mb-2" style="color:var(--dark);">Pesanan Terkirim!</h2>
     <p class="mb-1" style="color:#8B7355;">Silakan lanjutkan pembayaran melalui chat WhatsApp.</p>
     <button onclick="resetOrder()" class="mt-8 px-8 py-3 rounded-full text-white font-semibold transition hover:opacity-90" style="background:var(--primary);">Pesan Lagi</button>
    </div>
   </div>
  </div>

  <script>
// ========== APP CONFIG (Alternatif SDK) ==========
const APP_CONFIG = {
  store_name: 'Dapur Melodia',
  tagline: 'Dimsum Premium Homemade',
  whatsapp: '6282122321195' // GANTI NOMOR WA DISINI
};

// ========== DATA MENU ==========
const CATEGORIES = ["Dimsum Kukus", "Dimsum Mentai / Topping", "Frozen Food"];
const MENU = [
  { id: 'original', category: 'Dimsum Kukus', name: 'Dimsum Original', emoji: '🥟', desc: 'Dimsum kukus klasik dengan isian ayam dan udang pilihan', variants: [
    { id: 'original-4', label: 'Isi 4 pcs', price: 15000 },
    { id: 'original-6', label: 'Isi 6 pcs', price: 20000 }
  ]},
  { id: 'udang', category: 'Dimsum Kukus', name: 'Dimsum Udang', emoji: '🍤', desc: 'Isian udang utuh yang juicy di setiap gigitan', variants: [
    { id: 'udang-4', label: 'Isi 4 pcs', price: 18000 },
    { id: 'udang-6', label: 'Isi 6 pcs', price: 25000 }
  ]},
  { id: 'mentai', category: 'Dimsum Mentai / Topping', name: 'Dimsum Mentai', emoji: '🧀', desc: 'Dimsum spesial dengan topping saus mentai yang creamy & gurih', variants: [
    { id: 'mentai-4', label: 'Isi 4 pcs', price: 20000 },
    { id: 'mentai-6', label: 'Isi 6 pcs', price: 28000 }
  ]},
  { id: 'mozarella', category: 'Dimsum Mentai / Topping', name: 'Dimsum Mozarella', emoji: '🔥', desc: 'Topping keju mozarella yang meleleh sempurna', variants: [
    { id: 'moza-4', label: 'Isi 4 pcs', price: 22000 }
  ]},
  { id: 'frozen-mix', category: 'Frozen Food', name: 'Mix Frozen Pack', emoji: '❄️', desc: 'Cocok untuk stok di rumah, isi 10 pcs campur', variants: [
    { id: 'frozen-10', label: 'Isi 10 pcs', price: 45000 }
  ]}
];

let cart = {};

// ========== HELPERS ==========
function formatRp(n) { return 'Rp ' + n.toLocaleString('id-ID'); }

function showToast(msg) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast px-5 py-3 rounded-xl text-white text-sm font-semibold shadow-lg bg-[#2C1810]';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('app').scrollTop = 0;
  if (id === 'cart') renderCart();
  if (id === 'checkout') renderCheckout();
}

// ========== RENDER MENU ==========
function renderMenu() {
  const container = document.getElementById('menu-container');
  container.innerHTML = '';
  CATEGORIES.forEach(catName => {
    const itemsInCat = MENU.filter(m => m.category === catName);
    if (itemsInCat.length === 0) return;
    const catHeader = document.createElement('div');
    catHeader.className = 'flex items-center gap-3 mb-4 mt-8 first:mt-0';
    catHeader.innerHTML = `<div class="w-1.5 h-6 rounded-full bg-[#C0392B]"></div><h2 class="font-display text-xl font-bold text-[#2C1810]">${catName}</h2>`;
    container.appendChild(catHeader);
    const list = document.createElement('div');
    list.className = 'flex flex-col gap-4 mb-8';
    itemsInCat.forEach(item => {
      const card = document.createElement('div');
      card.className = 'menu-card rounded-2xl p-5 bg-white border border-[#F0E0D0] fade-in';
      card.innerHTML = `<div class="flex items-start gap-4 mb-4"><span class="text-4xl">${item.emoji}</span><div class="flex-1"><h3 class="font-display text-lg font-bold text-[#2C1810]">${item.name}</h3><p class="text-xs mt-1 text-[#8B7355]">${item.desc}</p></div></div><div class="flex flex-col gap-3" id="variants-${item.id}"></div>`;
      list.appendChild(card);
      const vc = card.querySelector(`#variants-${item.id}`);
      item.variants.forEach(v => {
        const row = document.createElement('div');
        row.className = 'flex items-center gap-3 p-3 rounded-xl bg-[#FFFAF5] border border-[#F0E0D0]';
        row.innerHTML = `<div class="flex-1"><span class="text-sm font-semibold text-[#2C1810]">${v.label}</span><span class="text-xs ml-2 font-medium text-[#C0392B]">${formatRp(v.price)}</span></div><div class="flex items-center gap-2"><input type="number" id="qty-${v.id}" value="" min="1" max="50" placeholder="0" class="w-12 text-center py-1.5 rounded-lg text-sm font-semibold border border-[#E0D0C0] outline-none"><button onclick="addToCart('${item.id}','${v.id}')" class="p-2 rounded-lg text-white bg-[#C0392B] active:scale-95"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button></div>`;
        vc.appendChild(row);
      });
    });
    container.appendChild(list);
  });
}

function addToCart(menuId, variantId) {
  const input = document.getElementById('qty-' + variantId);
  let qty = parseInt(input.value);
  if (!qty || qty < 1) qty = 1;
  const menu = MENU.find(m => m.id === menuId);
  const variant = menu.variants.find(v => v.id === variantId);
  if (cart[variantId]) { cart[variantId].qty += qty; } else { cart[variantId] = { menu, variant, qty }; }
  input.value = '';
  showToast(`${menu.name} ditambahkan!`);
  updateCartBadge();
}

function updateCartBadge() {
  const entries = Object.values(cart);
  const totalItems = entries.reduce((s, c) => s + c.qty, 0);
  const badge = document.getElementById('cart-badge');
  const floatBar = document.getElementById('floating-cart');
  if (totalItems > 0) {
    badge.textContent = totalItems;
    badge.classList.remove('hidden');
    const totalPrice = entries.reduce((s, c) => s + c.variant.price * c.qty, 0);
    document.getElementById('floating-cart-total').textContent = `${totalItems} item • ${formatRp(totalPrice)}`;
    floatBar.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
    floatBar.classList.add('hidden');
  }
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const entries = Object.entries(cart);
  if (entries.length === 0) {
    container.innerHTML = '';
    document.getElementById('cart-empty').classList.remove('hidden');
    document.getElementById('cart-footer').classList.add('hidden');
    return;
  }
  document.getElementById('cart-empty').classList.add('hidden');
  document.getElementById('cart-footer').classList.remove('hidden');
  container.innerHTML = '';
  let subtotal = 0;
  entries.forEach(([vid, item]) => {
    const lineTotal = item.variant.price * item.qty;
    subtotal += lineTotal;
    const row = document.createElement('div');
    row.className = 'flex items-center gap-4 p-4 rounded-2xl bg-white border border-[#F0E0D0] fade-in';
    row.innerHTML = `<span class="text-3xl">${item.menu.emoji}</span><div class="flex-1 min-w-0"><p class="font-semibold text-sm truncate">${item.menu.name}</p><p class="text-xs text-[#8B7355]">${item.variant.label}</p></div><div class="flex items-center gap-2"><button onclick="changeQty('${vid}',-1)" class="w-7 h-7 rounded-full border border-[#E0D0C0] flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg></button><span class="w-6 text-center font-bold text-sm">${item.qty}</span><button onclick="changeQty('${vid}',1)" class="w-7 h-7 rounded-full border border-[#E0D0C0] flex items-center justify-center"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button></div><div class="text-right min-w-[80px]"><p class="font-bold text-sm text-[#C0392B]">${formatRp(lineTotal)}</p></div>`;
    container.appendChild(row);
  });
  document.getElementById('cart-subtotal').textContent = formatRp(subtotal);
}

function changeQty(vid, delta) {
  if (!cart[vid]) return;
  cart[vid].qty += delta;
  if (cart[vid].qty <= 0) delete cart[vid];
  renderCart();
  updateCartBadge();
}

function renderCheckout() {
  const container = document.getElementById('checkout-items');
  container.innerHTML = '';
  let total = 0;
  Object.values(cart).forEach(item => {
    const line = item.variant.price * item.qty;
    total += line;
    const row = document.createElement('div');
    row.className = 'flex justify-between py-1';
    row.innerHTML = `<span class="text-[#5D4037]">${item.menu.name} (${item.variant.label}) x${item.qty}</span><span class="font-semibold">${formatRp(line)}</span>`;
    container.appendChild(row);
  });
  document.getElementById('checkout-total').textContent = formatRp(total);
}

function placeOrder() {
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const addr = document.getElementById('cust-address').value.trim();
  const payment = document.querySelector('input[name="payment"]:checked').value;
  if (!name || !phone || !addr) { showToast('Harap lengkapi semua data!'); return; }

  let message = `*PESANAN BARU - DAPUR MELODIA*\n----------------------------------\n*Nama:* ${name}\n*No. WA:* ${phone}\n*Alamat:* ${addr}\n*Pembayaran:* ${payment}\n----------------------------------\n*Daftar Pesanan:*\n`;
  let grandTotal = 0;
  Object.values(cart).forEach(item => {
    const linePrice = item.variant.price * item.qty;
    message += `- ${item.menu.name} (${item.variant.label}) x${item.qty} = ${formatRp(linePrice)}\n`;
    grandTotal += linePrice;
  });
  message += `----------------------------------\n*TOTAL PEMBAYARAN: ${formatRp(grandTotal)}*\n----------------------------------\nMohon segera diproses ya, terima kasih!`;
  const waUrl = `https://wa.me/${APP_CONFIG.whatsapp}?text=${encodeURIComponent(message)}`;
  window.open(waUrl, '_blank');
  showPage('success');
}

function resetOrder() {
  cart = {};
  updateCartBadge();
  document.getElementById('checkout-form').reset();
  showPage('menu');
}

// ========== INIT ON LOAD ==========
window.onload = () => {
    document.getElementById('el-store-name').textContent = APP_CONFIG.store_name;
    document.getElementById('el-tagline').textContent = APP_CONFIG.tagline;
    renderMenu();
};
</script>
 </body>
</html>
